<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Test — CodeSafer</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .test-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .test-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px;
      max-width: 480px;
      width: 100%;
    }
    .test-card h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }
    .test-card .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .field input, .field select {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .test-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .test-btn:hover {
      background: var(--primary-hover);
    }
    .log {
      margin-top: 24px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      font-family: monospace;
      font-size: 13px;
      color: var(--text-muted);
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="test-page">
    <div class="test-card">
      <h1>Checkout Test</h1>
      <p class="subtitle">Test the full payment flow with a test price ID</p>

      <div class="field">
        <label>Test Price ID</label>
        <input type="text" id="test-price-id" placeholder="pri_01..." value="">
      </div>

      <div class="field">
        <label>Plan</label>
        <select id="test-plan">
          <option value="dev">Dev</option>
          <option value="team">Team</option>
        </select>
      </div>

      <div class="field">
        <label>Period</label>
        <select id="test-period">
          <option value="monthly">Monthly</option>
          <option value="yearly">Yearly</option>
        </select>
      </div>

      <button class="test-btn" onclick="startTestCheckout()">Open Checkout</button>

      <div class="log" id="log">Waiting...</div>
    </div>
  </div>

  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <script>
    const log = document.getElementById('log');

    function addLog(msg) {
      const time = new Date().toLocaleTimeString();
      log.textContent += `\n[${time}] ${msg}`;
      log.scrollTop = log.scrollHeight;
    }

    // Initialize Paddle
    Paddle.Initialize({
      token: 'live_8d1ecb79cacb43b9b3f240d7240',
      eventCallback: (event) => {
        addLog(`Event: ${event.name}`);

        if (event.name === 'checkout.completed') {
          const customerId = event.data?.customer?.id || '';
          const txId = event.data?.transaction_id || '';
          addLog(`Customer ID: ${customerId}`);
          addLog(`Transaction ID: ${txId}`);

          sessionStorage.setItem('checkout_customer_id', customerId);
          sessionStorage.setItem('checkout_transaction_id', txId);

          addLog('Redirecting to success page in 2s...');
          setTimeout(() => {
            window.location.href = '/success.html';
          }, 2000);
        }
      },
    });
    addLog('Paddle initialized (production)');

    function startTestCheckout() {
      const priceId = document.getElementById('test-price-id').value.trim();
      const plan = document.getElementById('test-plan').value;
      const period = document.getElementById('test-period').value;

      if (!priceId) {
        addLog('ERROR: Enter a Price ID');
        return;
      }

      addLog(`Opening checkout: ${priceId} (${plan}/${period})`);

      Paddle.Checkout.open({
        items: [{ priceId, quantity: 1 }],
        settings: {
          displayMode: 'overlay',
          theme: 'dark',
          locale: 'ko',
          allowLogout: true,
        },
        customData: { plan, period },
      });
    }
  </script>
</body>
</html>
